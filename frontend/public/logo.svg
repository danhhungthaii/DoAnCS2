<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="30%" stop-color="#0288D1"/>
      <stop offset="60%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#27AE60"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EBF5FB"/>
      <stop offset="100%" stop-color="#F0F9FF"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#43A047"/>
    </linearGradient>
    <clipPath id="innerClip">
      <circle cx="100" cy="100" r="88"/>
    </clipPath>
  </defs>

  <!-- Outer gradient ring -->
  <circle cx="100" cy="100" r="99" fill="url(#ringGrad)"/>
  <!-- White inner circle -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGrad)"/>

  <!-- Decorative dashed orbit -->
  <circle cx="100" cy="100" r="74" fill="none" stroke="#1565C0" stroke-width="1" stroke-dasharray="6,5" opacity="0.25"/>

  <!-- Top dark header band -->
  <path d="M18,82 A85,85 0 0,1 182,82 L177,68 A80,80 0 0,0 23,68 Z" fill="#1A237E" opacity="0.85" clip-path="url(#innerClip)"/>

  <!-- Graduation cap -->
  <g transform="translate(100,44)">
    <polygon points="0,-13 -24,2 0,14 24,2" fill="#FFFFFF"/>
    <rect x="-5" y="-21" width="10" height="10" rx="2" fill="#FFFFFF"/>
    <line x1="22" y1="2" x2="22" y2="17" stroke="#F5A623" stroke-width="2.5"/>
    <circle cx="22" cy="19" r="3.5" fill="#F5A623"/>
  </g>

  <!-- Stars in header -->
  <circle cx="68" cy="62" r="2" fill="#F5A623" opacity="0.9"/>
  <circle cx="132" cy="62" r="2" fill="#F5A623" opacity="0.9"/>
  <circle cx="55" cy="72" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="145" cy="72" r="1.5" fill="#fff" opacity="0.7"/>

  <!-- Left student (female, blue) -->
  <g transform="translate(50,110)">
    <!-- Head -->
    <circle cy="-22" r="11" fill="#1565C0"/>
    <!-- Hair -->
    <path d="M-8,-32 Q0,-36 8,-32 Q10,-22 -10,-22 Z" fill="#0D47A1"/>
    <!-- Body -->
    <path d="M-13,2 Q0,-14 13,2 L11,30 L-11,30 Z" fill="#1565C0"/>
    <!-- Raised left arm -->
    <line x1="-13" y1="2" x2="-26" y2="-12" stroke="#1565C0" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Right student (male, teal) -->
  <g transform="translate(150,110)">
    <!-- Head -->
    <circle cy="-22" r="11" fill="#00897B"/>
    <!-- Body -->
    <path d="M-13,2 Q0,-14 13,2 L11,30 L-11,30 Z" fill="#00897B"/>
    <!-- Raised right arm -->
    <line x1="13" y1="2" x2="26" y2="-12" stroke="#00897B" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Center student (jumping, orange/yellow) -->
  <g transform="translate(100,100)">
    <!-- Head -->
    <circle cy="-24" r="13" fill="#F5A623"/>
    <!-- Body -->
    <path d="M-15,4 Q0,-14 15,4 L13,36 L-13,36 Z" fill="#F5A623"/>
    <!-- Both arms raised -->
    <line x1="-15" y1="4" x2="-30" y2="-12" stroke="#F5A623" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="15" y1="4" x2="30" y2="-12" stroke="#F5A623" stroke-width="5.5" stroke-linecap="round"/>
  </g>

  <!-- Document icons (background, subtle) -->
  <rect x="26" y="112" width="22" height="28" rx="3" fill="#90CAF9" opacity="0.45"/>
  <line x1="30" y1="119" x2="44" y2="119" stroke="#1565C0" stroke-width="1.5" opacity="0.6"/>
  <line x1="30" y1="124" x2="44" y2="124" stroke="#1565C0" stroke-width="1.5" opacity="0.6"/>
  <line x1="30" y1="129" x2="40" y2="129" stroke="#1565C0" stroke-width="1.5" opacity="0.6"/>

  <rect x="152" y="112" width="22" height="28" rx="3" fill="#90CAF9" opacity="0.45"/>
  <line x1="156" y1="119" x2="170" y2="119" stroke="#1565C0" stroke-width="1.5" opacity="0.6"/>
  <line x1="156" y1="124" x2="170" y2="124" stroke="#1565C0" stroke-width="1.5" opacity="0.6"/>
  <line x1="156" y1="129" x2="166" y2="129" stroke="#1565C0" stroke-width="1.5" opacity="0.6"/>

  <!-- BIG GREEN CHECKMARK (main focal point) -->
  <!-- Shadow/darker checkmark -->
  <path d="M38,130 L72,163 L162,68"
    stroke="#1B5E20" stroke-width="17" fill="none"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <!-- Main bright checkmark -->
  <path d="M38,130 L72,163 L162,68"
    stroke="url(#checkGrad)" stroke-width="13" fill="none"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Highlight on checkmark -->
  <path d="M38,130 L72,163 L162,68"
    stroke="#A5D6A7" stroke-width="4" fill="none"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
</svg>
